  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-analytics.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDat4FfZH2Bbz1zDMLhRwMps2xqtvx4vt4",
      authDomain: "shipments-tools.firebaseapp.com",
      projectId: "shipments-tools",
      storageBucket: "shipments-tools.firebasestorage.app",
      messagingSenderId: "869176882026",

<body>
  <div class="login-page">
    <div class="login-shell">
      <div class="login-card">
        <div class="login-shield">🛡️</div>
        <div class="login-title">Login</div>
        <div class="input-row">
          <span class="field-icon">👤</span>
          <input id="username" type="text" placeholder="Username">
        </div>
        <div class="input-row">
          <span class="field-icon">🔒</span>
          <input id="password" type="password" placeholder="Password">
        </div>
        <div class="remember-row">
          <label><input id="remember" type="checkbox"> Remember Me</label>
        </div>
        <button class="login-btn" onclick="doLogin()">Login</button>
        <div class="forgot-row">
          <div class="line"></div>
          <div class="forgot-link" onclick="openForgot()">Forgot Password?</div>
          <div class="line"></div>
        </div>
        <div class="login-credit">A Project Created By <span>Imran Ahmed</span></div>
      </div>
      <div class="side-panel">
        <div class="side-box">
          <div class="warn">⚠️</div>
          <h3>Expired Files</h3>
          <p>Please change your password</p>
        </div>
      </div>
    </div>
  </div>

  <div id="forgotModal" class="modal">
    <div class="modal-card">
      <h3>Reset Password</h3>
      <p>Contact administrator to reset your password.</p>
      <p><strong>Email:</strong> ahmedimran2323@gmail.com</p>
      <input id="pinInput" type="text" placeholder="Enter Reset PIN">
      <div class="modal-actions">
        <button class="modal-btn light" onclick="closeForgot()">Close</button>
        <button class="modal-btn primary" onclick="verifyPin()">Verify PIN</button>
      </div>
      <div id="resetStep2" class="hidden">
        <input id="newPasswordInput" type="password" placeholder="Enter New Password">
        <div class="modal-actions">
          <button class="modal-btn primary" onclick="saveNewPassword()">Save Password</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
